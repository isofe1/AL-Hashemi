<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="محاضرات حسين الهاشمي 2025" />
  <meta property="og:title" content="الهاشمي" />
  <meta property="og:image" content="Al-Hashemi.png" />
  <link rel="icon" type="image/png" href="icon.png" sizes="32x32">
  <link rel="apple-touch-icon" href="icon.png">
  <title>الهاشمي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
</head>
<body>
  <div id="layout" class="layout">
    
    <aside id="sidebar" class="sidebar">
      <button id="sidebarToggle" class="sidebar-toggle" type="button" aria-label="طي الشريط الجانبي" aria-expanded="true">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M15.5 4.5L8 12l7.5 7.5" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </button>

      <div class="sidebar__scroll-area">
        <div class="sidebar__header">
          <img src="Al-Hashemi.png" alt="حسين الهاشمي" class="teacher-image" />
          <h1>حسين الهاشمي</h1>
          <p>محاضرات 2026</p>
        </div>

        <div class="divider"></div>

        <nav>
          <ul id="classList" class="class-list"></ul>
        </nav>
      </div>
    </aside>

    <main class="content">
      <header class="content__header">
        <div> 
          <p class="eyebrow">  
            انستا: <a href="https://www.instagram.com/do7d_/" target="_blank" class="insta-link">@do7d_</a>  
          </p>  
          <h2 id="classTitle">...</h2>
        </div>
        <img src="icon.png" alt="شعار المنصة" class="content-logo" />
      </header>

      <section id="loading" class="state state--loading">جاري تحميل المحاضرات...</section>
      <section id="error" class="state state--error hidden">تعذر تحميل البيانات. حاول إعادة المحاولة.</section>

      <section id="lecturesGrid" class="lectures-grid hidden"></section>
    </main>
  </div>

  <div id="videoModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal__overlay" data-close="true"></div>
    <div class="modal__content">
      <button id="closeModal" class="close-btn" aria-label="إغلاق">×</button>
      <h3 id="modalTitle">مشاهدة المحاضرة</h3>
      <div class="video-container">
        <video id="player" playsinline controls aria-label="مشغل الفيديو"></video>
      </div>

      <div class="fullscreen-hint">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="15 3 21 3 21 9"></polyline>
          <polyline points="9 21 3 21 3 15"></polyline>
          <line x1="21" y1="3" x2="14" y2="10"></line>
          <line x1="3" y1="21" x2="10" y2="14"></line>
        </svg>
        <span>لتجربة مشاهدة أفضل، ننصحك بتفعيل ملء الشاشة</span>
      </div>
    </div>
  </div>

  <div id="continueWatchingBanner" class="continue-banner hidden">
    <div class="continue-info">
      <span class="continue-label">مواصلة المشاهدة</span>
      <span id="continueText" class="continue-text">...</span>
    </div>
    <button class="continue-play" aria-label="تشغيل">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <button class="close-banner" id="closeBannerBtn" aria-label="إغلاق">×</button>
  </div>
   
  <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
  <script src="script.js"></script>
</body>
</html>
