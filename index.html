<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="icon.png">
  <title>الهاشمي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="layout" class="layout">
    
    <aside id="sidebar" class="sidebar">
      <button id="sidebarToggle" class="sidebar-toggle" type="button" aria-label="طي الشريط الجانبي" aria-expanded="true">
        <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M15.5 4.5L8 12l7.5 7.5" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </button>

      <div class="sidebar__scroll-area">
        <div class="sidebar__header">
          <img src="Al-Hashemi.png" alt="أحسين الهاشمي" class="teacher-image" />
          <h1>حسين الهاشمي</h1>
          <p>محاضرات 2025</p>
        </div>

        <div class="divider"></div>

        <nav>
          <ul id="classList" class="class-list"></ul>
        </nav>
      </div>
    </aside>

    <main class="content">
      <header class="content__header">
        <div>
          <p class="eyebrow">منصة تعليمية تفاعلية</p>
          <h2 id="classTitle">...</h2>
        </div>
        <img src="logo.png" alt="شعار المنصة" class="content-logo" />
      </header>

      <section id="loading" class="state state--loading">جاري تحميل المحاضرات...</section>
      <section id="error" class="state state--error hidden">تعذر تحميل البيانات. حاول إعادة المحاولة لاحقاً.</section>

      <section id="lecturesGrid" class="lectures-grid hidden"></section>
    </main>
  </div>

  <div id="videoModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal__overlay" data-close="true"></div>
    <div class="modal__content">
      <button id="closeModal" class="close-btn" aria-label="إغلاق">×</button>
      <h3 id="modalTitle">مشاهدة المحاضرة</h3>
      <video id="modalVideo" controls playsinline></video>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
